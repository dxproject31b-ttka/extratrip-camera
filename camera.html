<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STANDALONE CAMERA PRO</title>
    <script src="https://cdn.tailwindcss.com?version=3.4.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-height: 100vh;
        }
        body { 
            font-family: 'Kanit', 'Space Grotesk', sans-serif; 
            background-color: #020617; 
            color: #ffffff; 
            overscroll-behavior: none;
            min-height: var(--app-height);
            height: var(--app-height);
            transition: background-color 0.3s ease;
        }
        .glass-bento {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* =======================================================
           โครงสร้าง RESPONSIVE บังคับผ่าน JS-CLASS เพื่อความเสถียรสูง
           ======================================================= */
        
        /* 1. โหมดจอแนวนอน (Landscape Mode) ของทุกเบราว์เซอร์ */
        .is-landscape #main-wrapper {
            flex-direction: row !important;
            gap: 1.5rem !important;
            align-items: center !important;
            justify-content: center !important;
            width: 100% !important;
            height: 100% !important;
        }
        .is-landscape .camera-section {
            max-width: 55vw !important;
            flex-shrink: 0 !important;
        }
        .is-landscape .camera-frame-container {
            height: calc(var(--app-height) * 0.62) !important;
            width: auto !important;
            aspect-ratio: 4/3 !important;
            max-width: 100% !important;
        }
        .is-landscape .controls-container {
            max-width: 280px !important;
            width: 100% !important;
            margin-top: 0 !important;
            justify-content: center !important;
        }
        .is-landscape .title-container h2 {
            font-size: 0.85rem !important;
        }

        /* 2. โหมดจอแนวตั้ง (Portrait Mode) ของทุกเบราว์เซอร์ */
        .is-portrait #main-wrapper {
            flex-direction: column !important;
            gap: 1rem !important;
            align-items: center !important;
            justify-content: space-between !important;
        }
        .is-portrait .camera-frame-container {
            width: 100% !important;
            max-width: 360px !important;
            aspect-ratio: 4/3 !important;
            height: auto !important;
        }
        .is-portrait .controls-container {
            width: 100% !important;
            max-width: 360px !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-3 sm:p-4 relative overflow-hidden">
    <!-- พื้นหลังไล่ระดับเฉดสี -->
    <div class="absolute inset-0 bg-gradient-to-b from-slate-900 via-slate-950 to-black z-0"></div>

    <!-- โครงสร้างหลัก (สลับ Layout ด้วย JS คอนโทรลคลาส) -->
    <div id="main-wrapper" class="relative z-10 w-full max-w-4xl flex flex-col items-center justify-center my-auto">
        
        <!-- ส่วนแสดงกล้อง / Preview -->
        <div class="camera-section flex flex-col items-center w-full">
            <!-- ข้อมูลระบุตำแหน่งมุมกล้อง -->
            <div class="title-container text-center w-full mb-2">
                <h2 class="text-indigo-400 text-sm sm:text-base font-bold tracking-widest uppercase">STANDALONE CAMERA PRO</h2>
                <p class="text-[10px] sm:text-[11px] text-slate-400 mt-0.5 uppercase tracking-wider">Side Target: <span class="text-rose-400" id="side-indicator">...</span></p>
            </div>

            <!-- เฟรมหน้าจอกล้อง -->
            <div class="camera-frame-container relative w-full aspect-[4/3] rounded-3xl overflow-hidden glass-bento flex flex-col items-center justify-center border border-white/10 shadow-2xl">
                <!-- วิดีโอสตรีมสด -->
                <video id="webcam" autoplay playsinline class="absolute inset-0 w-full h-full object-cover hidden"></video>
                
                <!-- Fallback ถ่ายผ่านแอปหลักมือถือกรณีเบราว์เซอร์ปฏิเสธสตรีมวิดีโอ -->
                <div id="fallback-ui" class="flex flex-col items-center p-6 text-center space-y-4 cursor-pointer">
                    <input type="file" id="native-camera" accept="image/*" capture="environment" class="hidden" />
                    <div class="w-14 h-14 rounded-full bg-indigo-600/20 text-indigo-400 flex items-center justify-center border border-indigo-500/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                    </div>
                    <div>
                        <h3 class="font-medium text-[14px] text-white tracking-wide">แตะพื้นที่นี้เพื่อเปิดกล้อง</h3>
                        <p class="text-[10px] text-slate-400 mt-0.5 uppercase tracking-widest">Tap to trigger native camera</p>
                    </div>
                </div>

                <!-- รูปถ่ายตัวอย่างที่แคปเจอร์สำเร็จแล้ว -->
                <img id="preview-img" class="absolute inset-0 w-full h-full object-cover hidden" />
                
                <!-- ตัวโหลดสปินเนอร์ขณะบีบอัดรูปภาพ -->
                <div id="loading-spinner" class="absolute inset-0 bg-black/80 backdrop-blur-md flex flex-col items-center justify-center hidden">
                    <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-[11px] text-indigo-400 font-mono tracking-widest mt-4 uppercase">COMPRESSING...</p>
                </div>
            </div>
        </div>

        <!-- แผงควบคุมปุ่มกด -->
        <div class="controls-container w-full flex flex-col gap-2.5 mt-4">
            <!-- ปุ่มกดถ่ายรูป -->
            <button id="shutter-btn" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-2xl flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/30 transition-all text-[14px] hidden">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                <span>กดถ่ายภาพ</span>
            </button>

            <!-- ปุ่มสลับกล้องหน้าหลัง -->
            <button id="switch-camera-btn" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-xl flex items-center justify-center gap-2 transition-all text-xs hidden">
                <span>🔄 สลับกล้อง (หน้า/หลัง)</span>
            </button>

            <!-- ปุ่มส่งข้อมูลกลับและปิดหน้าต่าง -->
            <button id="save-close-btn" disabled class="w-full py-3.5 bg-slate-800 text-slate-500 font-semibold rounded-2xl flex items-center justify-center gap-2 shadow-sm transition-all text-[13px] cursor-not-allowed">
                <span>โปรดถ่ายรูปก่อนกดส่งข้อมูล</span>
            </button>
            <p class="text-[9px] text-slate-500 text-center font-medium uppercase tracking-wider">Powered by Standalone Camera Bypass Protocol</p>
        </div>

    </div>

    <canvas id="compress-canvas" class="hidden"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const side = urlParams.get('side') || "left";
        document.getElementById("side-indicator").innerText = side;

        const video = document.getElementById("webcam");
        const fallbackUi = document.getElementById("fallback-ui");
        const nativeCamera = document.getElementById("native-camera");
        const previewImg = document.getElementById("preview-img");
        const loadingSpinner = document.getElementById("loading-spinner");
        const canvas = document.getElementById("compress-canvas");
        const shutterBtn = document.getElementById("shutter-btn");
        const switchCameraBtn = document.getElementById("switch-camera-btn");
        const saveCloseBtn = document.getElementById("save-close-btn");

        let localStream = null;
        let currentFacingMode = "environment"; 
        let compressedPayload = null;

        /**
         * ตรวจสอบและประมวลผลขนาดหน้าจอมือถือจริง
         * ช่วยให้สามารถเปลี่ยนรูปแบบการแสดงผลตามแนวนอน-ตั้งได้แบบ 100% ในทุกรุ่นเบราว์เซอร์
         */
        function adjustViewportAndLayout() {
            const vh = window.innerHeight;
            const vw = window.innerWidth;
            
            // ตั้งค่าตัวแปรความสูงหน้าจอที่แท้จริง แก้ปัญหาระบบแถบ URL ของ Safari และ LINE Browser บดบังปุ่ม
            document.documentElement.style.setProperty('--app-height', `${vh}px`);

            // วิเคราะห์และบังคับใช้อินเตอร์เฟสตามอัตราความกว้างและสูงจริง
            if (vw > vh) {
                document.body.classList.add("is-landscape");
                document.body.classList.remove("is-portrait");
            } else {
                document.body.classList.add("is-portrait");
                document.body.classList.remove("is-landscape");
            }
        }

        // ลงทะเบียนตัวจับการขยับ/หมุนหน้าจอ (รวม Event Fallback ป้องกันบางเบราว์เซอร์ดีเลย์)
        window.addEventListener('resize', () => {
            adjustViewportAndLayout();
            setTimeout(adjustViewportAndLayout, 150);
        });
        window.addEventListener('orientationchange', () => {
            adjustViewportAndLayout();
            setTimeout(adjustViewportAndLayout, 150);
        });
        
        // รันตั้งค่าทันทีที่เปิดแอป
        adjustViewportAndLayout();

        async function startWebcam() {
            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: currentFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = localStream;
                video.classList.remove("hidden");
                shutterBtn.classList.remove("hidden");
                switchCameraBtn.classList.remove("hidden");
                fallbackUi.classList.add("hidden");
            } catch (err) {
                console.warn("ไม่สามารถเรียกใช้งานสตรีมกล้องสดได้ กำลังเข้าสู่โหมด Fallback:", err);
                fallbackUi.classList.remove("hidden");
                video.classList.add("hidden");
                shutterBtn.classList.add("hidden");
                switchCameraBtn.classList.add("hidden");
            }
        }

        startWebcam();

        switchCameraBtn.addEventListener("click", () => {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startWebcam();
        });

        fallbackUi.addEventListener("click", () => {
            nativeCamera.click();
        });

        shutterBtn.addEventListener("click", () => {
            if (!localStream) return;
            loadingSpinner.classList.remove("hidden");

            const ctx = canvas.getContext("2d");
            const width = video.videoWidth;
            const height = video.videoHeight;
            canvas.width = width;
            canvas.height = height;

            ctx.drawImage(video, 0, 0, width, height);
            processAndPreview();
        });

        nativeCamera.addEventListener("change", (e) => {
            const file = e.target.files?.[0];
            if (!file) return;

            loadingSpinner.classList.remove("hidden");

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const ctx = canvas.getContext("2d");
                    let { width, height } = img;
                    const maxDim = 800;

                    if (width > height && width > maxDim) {
                        height *= maxDim / width;
                        width = maxDim;
                    } else if (height > maxDim) {
                        width *= maxDim / height;
                        height = maxDim;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    processAndPreview();
                };
            };
        });

        function processAndPreview() {
            const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
            const base64Str = dataUrl.split(",")[1];

            previewImg.src = dataUrl;
            previewImg.classList.remove("hidden");
            video.classList.add("hidden");
            fallbackUi.classList.add("hidden");
            loadingSpinner.classList.add("hidden");
            shutterBtn.classList.add("hidden");
            switchCameraBtn.classList.add("hidden");

            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            compressedPayload = {
                type: "CAMERA_CAPTURE",
                side: side,
                base64: base64Str,
                mimeType: "image/jpeg",
                name: `standalone_${side}_${new Date().getTime()}.jpg`,
                timestamp: Date.now()
            };

            saveCloseBtn.removeAttribute("disabled");
            saveCloseBtn.classList.remove("bg-slate-800", "text-slate-500", "cursor-not-allowed");
            saveCloseBtn.classList.add("bg-rose-600", "hover:bg-rose-500", "text-white", "shadow-lg", "shadow-rose-600/30");
            saveCloseBtn.innerHTML = "<span>✓ ส่งข้อมูลและปิดหน้าต่าง</span>";
        }

        saveCloseBtn.addEventListener("click", () => {
            if (!compressedPayload) return;

            let isSent = false;

            if (window.opener) {
                try {
                    window.opener.postMessage(compressedPayload, "*");
                    isSent = true;
                } catch (e) {
                    console.warn("ไม่สามารถส่งข้อมูลกลับไปยังระบบหลักได้: ", e);
                }
            }

            try {
                localStorage.setItem("CAMERA_CAPTURE_FALLBACK", JSON.stringify(compressedPayload));
                isSent = true;
            } catch (e) {
                console.error("จัดเก็บบันทึกบนเครื่องล้มเหลว: ", e);
            }

            if (isSent) {
                window.close();
            } else {
                alert("เกิดข้อผิดพลาดในการส่งข้อมูลรูปภาพกลับโปรแกรมหลัก");
            }
        });
    </script>
</body>
</html>
